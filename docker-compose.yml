version: '3.8'

networks:
  security_lab_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

services:

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa_target
    hostname: dvwa-target
    networks:
      security_lab_net:
        ipv4_address: 172.20.0.2
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
    # CIS Section 5: Container Runtime Security
    read_only: false        # DVWA needs write access to /var/www
    security_opt:
      - no-new-privileges:true    # CIS 5.25
      - apparmor:docker-default   # CIS 5.1
    cap_drop:
      - ALL                       # CIS 5.3 - drop ALL capabilities first
    cap_add:
      - NET_BIND_SERVICE          # only add back what DVWA actually needs
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    mem_limit: 512m               # CIS 5.10 - RAM limit
    memswap_limit: 512m           # prevent swap abuse
    cpus: "0.5"                   # CPU limit - protect your 8GB host
    pids_limit: 100               # CIS 5.28 - limit process spawning
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  monitor:
    image: nicolaka/netshoot:latest
    container_name: traffic_monitor
    hostname: traffic-monitor
    networks:
      security_lab_net:
        ipv4_address: 172.20.0.3
    command: tail -f /dev/null
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN             # needed for traffic capture only
      - NET_RAW               # needed for raw packet access
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.25"
    pids_limit: 50
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
